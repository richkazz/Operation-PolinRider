name: 'PolinRider Guard'
description: 'Defensive scanners for PolinRider/GlassWorm-style developer supply-chain indicators.'
author: 'Operation PolinRider contributors'
inputs:
  path:
    description: 'The path to scan'
    required: false
    default: '.'
  json:
    description: 'Emit JSON findings'
    required: false
    default: 'false'
  no-git:
    description: 'Skip git history checks'
    required: false
    default: 'false'

outputs:
  findings-count:
    description: 'Number of findings produced by the scan.'
  highest-severity:
    description: 'Highest severity observed, or none when the scan is clean.'
  has-findings:
    description: 'true when one or more findings were produced.'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.path }}
    - ${{ inputs.json == 'true' && '--json' || '' }}
    - ${{ inputs['no-git'] == 'true' && '--no-git' || '' }}

branding:
  icon: 'shield'
  color: 'blue'
